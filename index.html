<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EEE8DC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="loose pomodoro">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>loose pomodoro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..500&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEE8DC;
    --surface: #F6F1E7;
    --surface-alt: #EBE3D2;
    --ink: #2A2621;
    --ink-dim: #6F675C;
    --ink-mute: #9A9182;
    --hair: #D7CFC0;
    --work: #2D4057;
    --work-soft: #E2E6EE;
    --rest: #5F7355;
    --rest-soft: #E5ECDA;
    --warn: #A36B3C;
    --danger: #9E4A3F;
    --font-display: "Fraunces", "Noto Serif JP", Georgia, serif;
    --font-body: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); overscroll-behavior: none; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .app {
    max-width: 560px;
    margin: 0 auto;
    padding-bottom: 84px;
    position: relative;
    min-height: 100vh;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.06;
    background-image: radial-gradient(#2a2621 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    max-width: 560px;
    margin: 0 auto;
    left: 0; right: 0;
  }
  header { padding: 22px 24px 4px; }
  .brand {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.01em;
    color: var(--ink-dim);
  }

  .view { padding: 16px 20px 20px; display: flex; flex-direction: column; flex: 1; }

  /* Start screen */
  .start-btn {
    width: 100%; background: var(--work); color: var(--bg);
    border: none; border-radius: 28px; padding: 72px 24px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 0 #1c2a3d; margin-top: 32px;
    transition: transform 0.1s;
  }
  .start-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #1c2a3d; }
  .start-btn .j {
    font-family: var(--font-display); font-style: italic;
    font-size: 38px; font-weight: 400; letter-spacing: 0.01em;
  }

  /* Main button */
  .main-btn {
    width: 100%; aspect-ratio: 4 / 3; max-height: 46vh;
    border-radius: 28px; padding: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    touch-action: manipulation; user-select: none;
    margin-top: 8px;
    box-shadow: 0 1px 0 var(--hair);
    transition: transform 0.1s;
  }
  .main-btn:active { transform: scale(0.995); }
  .main-btn.work { background: var(--work-soft); color: var(--work); border: 1px solid #2D405722; }
  .main-btn.rest { background: var(--rest-soft); color: var(--rest); border: 1px solid #5F735522; }
  .main-btn .label {
    font-family: var(--font-display); font-style: italic;
    font-size: 22px; font-weight: 400;
  }
  .main-btn .time {
    font-family: var(--font-display);
    font-size: clamp(64px, 20vw, 96px);
    font-weight: 300; letter-spacing: -0.02em;
    line-height: 1; font-feature-settings: "tnum";
  }
  .end-btn {
    width: 100%; margin-top: 14px; padding: 14px;
    background: transparent; color: var(--ink-mute);
    border: 1px solid var(--hair); border-radius: 14px;
    font-size: 13px; letter-spacing: 0.08em;
  }
  .end-btn:active { background: var(--surface-alt); color: var(--ink-dim); }

  .gentle {
    margin-top: 16px; padding: 14px 18px; background: var(--surface-alt);
    border-radius: 14px; font-size: 13px; color: var(--warn);
    font-family: var(--font-display); font-style: italic; line-height: 1.5;
    animation: fadeIn 0.4s ease-out;
    border: 1px solid #A36B3C22;
  }

  /* Today card */
  .today {
    margin-top: 20px; padding: 20px;
    background: var(--surface); border-radius: 20px;
    border: 1px solid var(--hair);
  }
  .today .label, .week-hd .label, .daily-label, .sessions-label {
    font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 600;
  }
  .today .label { margin-bottom: 12px; }
  .today-row { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .today-row .cell .t {
    font-size: 11px; color: var(--ink-dim); margin-bottom: 2px;
  }
  .today-row .cell .v {
    font-family: var(--font-display); font-size: 26px; font-weight: 400;
    letter-spacing: -0.01em;
  }
  .today-row .cell.work .v { color: var(--work); }
  .today-row .cell.rest .v { color: var(--rest); }
  .today-row .cell.rate { margin-left: auto; text-align: right; }
  .today-row .cell.rate .v {
    font-style: italic; color: var(--ink);
  }
  .ratio-bar {
    display: flex; height: 6px; border-radius: 100px; overflow: hidden;
    background: var(--hair);
  }
  .ratio-bar > div:first-child { background: var(--work); }
  .ratio-bar > div:last-child { background: var(--rest); }

  /* History */
  .empty {
    padding: 60px 32px; text-align: center; color: var(--ink-mute);
  }
  .empty .big {
    font-family: var(--font-display); font-style: italic; font-size: 22px;
    color: var(--ink-dim); margin-bottom: 8px;
  }
  .empty .sub { font-size: 13px; line-height: 1.6; }

  .history { padding: 8px 20px; }

  /* Week chart */
  .week-card {
    padding: 18px 18px 14px; background: var(--surface);
    border-radius: 18px; border: 1px solid var(--hair);
    margin-top: 10px;
  }
  .week-hd {
    display: flex; align-items: baseline; margin-bottom: 14px;
    flex-wrap: wrap; gap: 8px;
  }
  .week-hd .stats {
    margin-left: auto; font-size: 12px; color: var(--ink-dim);
  }
  .week-hd .stats em {
    font-family: var(--font-display); font-style: italic;
    font-size: 16px; font-weight: 500;
  }
  .week-hd .stats em.work { color: var(--work); }
  .week-hd .stats em.ink { color: var(--ink); }
  .week-hd .stats .dot { margin: 0 6px; color: var(--hair); }

  .week-bars {
    display: flex; align-items: flex-end; justify-content: space-between;
    height: 126px; gap: 6px; padding-top: 8px;
  }
  .bar-col {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px; min-width: 0;
  }
  .bar-col .vlabel {
    font-size: 9px; color: var(--ink-mute); height: 12px;
    font-feature-settings: "tnum";
  }
  .bar-col .bar {
    width: 100%; height: 90px; display: flex;
    flex-direction: column; justify-content: flex-end;
    border-radius: 4px; overflow: hidden;
  }
  .bar-col .bar.empty {
    background: var(--surface-alt);
    border: 1px dashed var(--hair);
  }
  .bar-col .bar .rest-part { background: var(--rest); opacity: 0.85; }
  .bar-col .bar .work-part { background: var(--work); }
  .bar-col .dlabel {
    font-size: 10px; color: var(--ink-mute);
    font-weight: 400; letter-spacing: 0.05em;
  }
  .bar-col.today .dlabel { color: var(--ink); font-weight: 700; }

  .daily-label { margin: 20px 4px 10px; }

  /* Day card */
  .day-card {
    background: var(--surface); border-radius: 18px;
    border: 1px solid var(--hair);
    margin-bottom: 12px; overflow: hidden;
  }
  .day-header {
    width: 100%; background: transparent; border: none;
    padding: 18px 20px; text-align: left; color: var(--ink);
  }
  .day-header .top {
    display: flex; align-items: baseline; margin-bottom: 12px;
  }
  .day-header .date {
    font-family: var(--font-display); font-size: 19px;
    font-weight: 500; color: var(--ink);
  }
  .day-header .today-badge {
    margin-left: 8px; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--warn); font-weight: 600;
  }
  .day-header .chevron {
    margin-left: auto; font-size: 14px; color: var(--ink-mute);
    transition: transform 0.2s;
  }
  .day-card.open .day-header .chevron { transform: rotate(180deg); }
  .day-stats { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
  .day-stats .cell .t {
    font-size: 10px; color: var(--ink-dim); margin-bottom: 2px; letter-spacing: 0.1em;
  }
  .day-stats .cell .v {
    font-family: var(--font-display); font-size: 22px;
  }
  .day-stats .cell.work .v { color: var(--work); }
  .day-stats .cell.rest .v { color: var(--rest); }
  .day-stats .cell.rate { margin-left: auto; }
  .day-stats .cell.rate .v { font-style: italic; color: var(--ink); }

  .timeline-wrap { position: relative; height: 28px; margin-bottom: 18px; }
  .timeline-bg {
    position: absolute; inset: 0; background: var(--surface-alt);
    border-radius: 6px;
  }
  .timeline-seg {
    position: absolute; top: 0; bottom: 0; border-radius: 2px; opacity: 0.9;
  }
  .timeline-seg.work { background: var(--work); }
  .timeline-seg.rest { background: var(--rest); }
  .timeline-ticks {
    position: absolute; bottom: -12px; left: 0; right: 0; height: 12px;
  }
  .timeline-ticks .tick {
    position: absolute; transform: translateX(-50%);
    font-size: 9px; color: var(--ink-mute);
  }

  .day-body {
    border-top: 1px solid var(--hair);
    padding: 14px 20px 18px;
    background: var(--surface-alt);
    animation: fadeIn 0.25s ease-out;
  }
  .day-body .sessions-head {
    display: flex; align-items: center; margin-bottom: 12px; gap: 8px;
  }
  .export-btn {
    margin-left: auto;
    background: var(--ink); color: var(--bg);
    border: none; padding: 8px 14px; border-radius: 100px;
    font-size: 11px; letter-spacing: 0.08em;
  }

  /* Session item */
  .session {
    background: var(--surface); padding: 14px 16px;
    border-radius: 14px; margin-bottom: 10px;
    border: 1px solid var(--hair);
  }
  .session .srow1 {
    display: flex; align-items: baseline; margin-bottom: 10px; gap: 8px;
  }
  .session .sclock {
    font-family: var(--font-display); font-size: 16px; color: var(--ink);
    font-feature-settings: "tnum";
  }
  .session .live-badge {
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--warn); font-weight: 700;
    padding: 2px 6px; border: 1px solid var(--warn);
    border-radius: 4px;
  }
  .session .del-btn {
    margin-left: auto; background: transparent;
    border: none; color: var(--ink-mute);
    font-size: 12px; padding: 4px 8px;
    letter-spacing: 0.05em;
  }
  .session .del-btn:active { color: var(--danger); }
  .session .srow2 {
    display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px;
    color: var(--ink-dim); flex-wrap: wrap;
  }
  .session .srow2 em {
    font-family: var(--font-display); font-size: 15px;
    margin-left: 4px; font-style: normal;
  }
  .session .srow2 em.work { color: var(--work); }
  .session .srow2 em.rest { color: var(--rest); }
  .session .srow2 em.rate { font-style: italic; color: var(--ink); }
  .session .srow2 .rate-wrap { margin-left: auto; }
  .session-tl {
    position: relative; height: 8px; border-radius: 4px;
    background: var(--surface-alt); overflow: hidden;
  }
  .session-tl .seg {
    position: absolute; top: 0; bottom: 0;
  }
  .session-tl .seg.work { background: var(--work); }
  .session-tl .seg.rest { background: var(--rest); }

  /* Lap list */
  .lap-list {
    margin-top: 10px; border-top: 1px solid var(--hair);
    padding-top: 8px; display: flex; flex-direction: column; gap: 2px;
  }
  .lap-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-dim); padding: 4px 0;
  }
  .lap-row .lap-type {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
  }
  .lap-row .lap-type.work { background: #2D405718; color: var(--work); }
  .lap-row .lap-type.rest { background: #5F735518; color: var(--rest); }
  .lap-row .lap-time {
    font-family: var(--font-display); font-size: 13px; color: var(--ink);
    font-feature-settings: "tnum";
  }
  .lap-row .lap-dur { color: var(--ink-mute); font-size: 11px; }
  .lap-edit-btn {
    margin-left: auto; background: transparent;
    border: 1px solid var(--hair); color: var(--ink-mute);
    font-size: 11px; padding: 3px 9px; border-radius: 6px;
    letter-spacing: 0.05em; flex-shrink: 0;
  }
  .lap-edit-btn:active { background: var(--surface-alt); }

  /* Edit lap sheet internals */
  .lap-edit-type {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; padding: 3px 10px; border-radius: 6px;
    margin-bottom: 20px;
  }
  .lap-edit-type.work { background: #2D405718; color: var(--work); }
  .lap-edit-type.rest { background: #5F735518; color: var(--rest); }
  .lap-edit-fields {
    display: flex; gap: 16px; margin-bottom: 20px;
  }
  .lap-edit-field {
    flex: 1; display: flex; flex-direction: column; gap: 6px;
  }
  .lap-edit-field label {
    font-size: 11px; color: var(--ink-mute); letter-spacing: 0.1em;
    font-weight: 600;
  }
  .lap-edit-field input[type="time"] {
    font-family: var(--font-display); font-size: 22px; color: var(--ink);
    background: var(--surface); border: 1px solid var(--hair);
    border-radius: 10px; padding: 12px 14px; width: 100%;
    outline: none; box-sizing: border-box;
  }
  .lap-edit-field input[type="time"]:focus { border-color: var(--ink-dim); }
  .lap-edit-error {
    font-size: 12px; color: var(--danger); background: #9E4A3F11;
    border: 1px solid #9E4A3F33; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 16px; line-height: 1.5;
  }

  /* Settings */
  .settings { padding: 16px 20px; }
  .status-card {
    padding: 18px 20px; background: var(--surface);
    border-radius: 18px; border: 1px solid var(--hair);
    margin-bottom: 16px;
  }
  .status-card .body {
    font-size: 14px; color: var(--ink-dim); line-height: 1.8;
    margin-top: 10px;
  }
  .status-card .body strong { color: var(--ink); font-weight: 600; }
  .danger-btn {
    width: 100%; background: transparent; color: var(--danger);
    border: 1px solid #9E4A3F55; padding: 16px; border-radius: 14px;
    font-size: 14px; letter-spacing: 0.05em;
  }
  .settings .note {
    margin-top: 28px; padding: 16px 4px; font-size: 12px; color: var(--ink-mute);
    line-height: 1.7; font-style: italic; font-family: var(--font-display);
  }

  /* Snackbar */
  .snackbar {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 12px 18px;
    border-radius: 100px; display: flex; gap: 14px; align-items: center;
    font-size: 14px; animation: fadeIn 0.2s ease-out;
    max-width: calc(100vw - 32px); z-index: 20;
    box-shadow: 0 6px 24px rgba(42,38,33,0.2);
  }
  .snackbar .msg {
    font-family: var(--font-display); font-style: italic;
  }
  .snackbar .undo {
    background: transparent; border: 1px solid var(--ink-mute);
    color: var(--bg); padding: 4px 12px; border-radius: 100px;
    font-size: 13px; letter-spacing: 0.05em;
  }

  /* Bottom Sheet */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(42,38,33,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 30; animation: fadeIn 0.2s ease-out;
  }
  .sheet {
    background: var(--bg); border-top-left-radius: 24px; border-top-right-radius: 24px;
    width: 100%; max-width: 560px; padding: 24px 24px 40px;
  }
  .sheet h2 {
    font-family: var(--font-display); font-size: 22px; font-weight: 400;
    margin: 0 0 20px;
  }
  .sheet .body {
    font-size: 14px; color: var(--ink-dim); margin: -12px 0 20px; line-height: 1.7;
  }
  .sheet .danger-note {
    font-size: 12px; color: var(--danger); margin-bottom: 20px; line-height: 1.5;
    padding: 10px 14px; background: #9E4A3F11;
    border-radius: 10px; border: 1px solid #9E4A3F33;
  }
  .btn-primary {
    width: 100%; background: var(--ink); color: var(--bg);
    border: none; padding: 16px; border-radius: 14px;
    font-size: 15px; letter-spacing: 0.05em; margin-bottom: 10px;
  }
  .btn-primary.danger { background: var(--danger); }
  .btn-ghost {
    width: 100%; background: transparent; color: var(--ink-dim);
    border: 1px solid var(--hair); padding: 16px; border-radius: 14px;
    font-size: 15px;
  }

  /* Export modal */
  .export-overlay {
    position: fixed; inset: 0; background: rgba(42,38,33,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 40; padding: 20px; animation: fadeIn 0.2s ease-out;
  }
  .export-box {
    background: var(--bg); border-radius: 20px; max-width: 480px; width: 100%;
    padding: 16px; max-height: 92vh; overflow: auto;
  }
  .export-box img {
    width: 100%; border-radius: 12px; display: block;
    border: 1px solid var(--hair);
  }
  .export-box .hint {
    font-size: 11px; color: var(--ink-mute); text-align: center;
    margin: 12px 0 14px; letter-spacing: 0.05em;
  }

  /* Tab bar */
  nav.tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--hair);
    display: flex; justify-content: space-around;
    max-width: 560px; margin: 0 auto;
    padding-bottom: env(safe-area-inset-bottom, 12px);
    z-index: 10;
  }
  nav.tabs button {
    flex: 1; background: none; border: none;
    padding: 16px 0 18px; position: relative;
    color: var(--ink-mute); font-size: 13px; font-weight: 400;
    letter-spacing: 0.08em;
  }
  nav.tabs button.active {
    color: var(--ink); font-weight: 600;
  }
  nav.tabs button.active::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 2px; background: var(--ink);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <div class="grain"></div>

  <header>
    <div class="brand">loose pomodoro</div>
  </header>

  <div id="view-now" class="view"></div>
  <div id="view-history" class="view hidden" style="padding: 0;"></div>
  <div id="view-settings" class="view hidden" style="padding: 0;"></div>

  <nav class="tabs">
    <button id="tab-now" class="active" data-tab="now">いま</button>
    <button id="tab-history" data-tab="history">履歴</button>
    <button id="tab-settings" data-tab="settings">設定</button>
  </nav>
</div>

<script>
// ============================================================
// Loose Pomodoro - Vanilla JS Version
// ============================================================

const STORAGE = {
  CURRENT: 'lp-current-v1',
  HISTORY: 'lp-history-v1',
};

// ---------- State ----------
const state = {
  tab: 'now',
  session: null,
  history: [],
  now: Date.now(),
  undo: null,
  confirmEnd: false,
  deleteTarget: null,
  editLapTarget: null,
  exportData: null,
  expandedDayKey: null,
};

// ---------- Persistence (localStorage) ----------
function saveCurrent(s) {
  try {
    if (s) localStorage.setItem(STORAGE.CURRENT, JSON.stringify(s));
    else localStorage.removeItem(STORAGE.CURRENT);
  } catch (e) { console.warn(e); }
}
function loadCurrent() {
  try {
    const raw = localStorage.getItem(STORAGE.CURRENT);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveHistory(h) {
  try { localStorage.setItem(STORAGE.HISTORY, JSON.stringify(h)); }
  catch (e) { console.warn(e); }
}
function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE.HISTORY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

// ---------- Time helpers ----------
function fmtLap(ms) {
  if (ms < 0) ms = 0;
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function fmtSummary(ms) {
  if (ms < 0) ms = 0;
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  if (h === 0 && m === 0) return '0m';
  if (h === 0) return m + 'm';
  return h + 'h ' + m + 'm';
}
function fmtClock(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function dayKey(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDateJP(ts) {
  const d = new Date(ts);
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  return (d.getMonth()+1) + '月' + d.getDate() + '日（' + wd + '）';
}
function fmtDateShort(ts) {
  const d = new Date(ts);
  return (d.getMonth()+1) + '/' + d.getDate();
}
function todayKey() { return dayKey(Date.now()); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function applyHHMM(originalTs, hhmmStr) {
  const d = new Date(originalTs);
  const [hh, mm] = hhmmStr.split(':').map(Number);
  d.setHours(hh, mm, 0, 0);
  return d.getTime();
}
function showLapEditError(msg) {
  const el = document.getElementById('lapEditError');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ---------- Aggregations ----------
function aggregateByDay(sessions) {
  const byDay = new Map();
  for (const s of sessions) {
    for (const lap of s.laps) {
      if (lap.endAt == null) continue;
      let cur = lap.startAt;
      while (cur < lap.endAt) {
        const d = new Date(cur);
        d.setHours(23,59,59,999);
        const dayEnd = Math.min(d.getTime()+1, lap.endAt);
        const k = dayKey(cur);
        if (!byDay.has(k)) {
          byDay.set(k, {
            key: k,
            ts: new Date(cur).setHours(0,0,0,0),
            work: 0, rest: 0, segments: []
          });
        }
        const entry = byDay.get(k);
        const dur = dayEnd - cur;
        if (lap.type === 'work') entry.work += dur;
        else entry.rest += dur;
        entry.segments.push({ type: lap.type, start: cur, end: dayEnd });
        cur = dayEnd;
      }
    }
  }
  return Array.from(byDay.values()).sort((a,b) => b.ts - a.ts);
}
function sessionsForDay(sessions, dayK) {
  return sessions
    .filter(s => s.laps.some(l => l.endAt != null && dayKey(l.startAt) === dayK))
    .sort((a,b) => a.startAt - b.startAt);
}
function sessionTotals(session, onDayK) {
  let work = 0, rest = 0, firstStart = null, lastEnd = null;
  for (const lap of session.laps) {
    if (lap.endAt == null) continue;
    if (onDayK && dayKey(lap.startAt) !== onDayK) continue;
    const dur = lap.endAt - lap.startAt;
    if (lap.type === 'work') work += dur; else rest += dur;
    if (firstStart == null || lap.startAt < firstStart) firstStart = lap.startAt;
    if (lastEnd == null || lap.endAt > lastEnd) lastEnd = lap.endAt;
  }
  return { work, rest, firstStart, lastEnd };
}
function getLastNDays(n, dayMap) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const arr = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = dayKey(d.getTime());
    const found = dayMap.get(k);
    arr.push({
      key: k, ts: d.getTime(),
      work: found?.work || 0, rest: found?.rest || 0
    });
  }
  return arr;
}
function getAllSessionsLive() {
  const all = [...state.history];
  if (state.session) {
    const liveClone = {
      ...state.session,
      laps: state.session.laps.map((l, i) =>
        i === state.session.laps.length - 1 && l.endAt == null
          ? { ...l, endAt: state.now } : l
      ),
    };
    all.push(liveClone);
  }
  return all;
}
function todayTotals() {
  const tk = todayKey();
  const all = getAllSessionsLive();
  let work = 0, rest = 0;
  for (const s of all) {
    for (const lap of s.laps) {
      if (dayKey(lap.startAt) !== tk) continue;
      const end = lap.endAt ?? state.now;
      const dur = end - lap.startAt;
      if (lap.type === 'work') work += dur; else rest += dur;
    }
  }
  return { work, rest };
}

// ---------- Actions ----------
function startSession() {
  const ts = Date.now();
  state.session = {
    id: ts, startAt: ts,
    laps: [{ id: ts, type: 'work', startAt: ts, endAt: null }],
  };
  saveCurrent(state.session);
  render();
}
function toggle() {
  if (!state.session) return;
  const prev = JSON.parse(JSON.stringify(state.session));
  const ts = Date.now();
  const laps = [...state.session.laps];
  const last = laps[laps.length - 1];
  const nextType = last.type === 'work' ? 'rest' : 'work';
  laps[laps.length - 1] = { ...last, endAt: ts };
  laps.push({ id: ts, type: nextType, startAt: ts, endAt: null });
  state.session = { ...state.session, laps };
  saveCurrent(state.session);
  state.undo = { prevSession: prev, expiresAt: Date.now() + 3500 };
  render();
}
function applyUndo() {
  if (!state.undo) return;
  state.session = state.undo.prevSession;
  saveCurrent(state.session);
  state.undo = null;
  render();
}
function endSession() {
  if (!state.session) return;
  const ts = Date.now();
  const laps = state.session.laps.map((l, i) =>
    i === state.session.laps.length - 1 && l.endAt == null ? { ...l, endAt: ts } : l
  );
  const finished = { ...state.session, laps, endAt: ts };
  state.history = [...state.history, finished];
  state.session = null;
  state.confirmEnd = false;
  state.undo = null;
  saveCurrent(null);
  saveHistory(state.history);
  render();
}
function deleteSession(id) {
  state.history = state.history.filter(s => s.id !== id);
  state.deleteTarget = null;
  saveHistory(state.history);
  render();
}
function openEditLap(sessionId, lapIndex) {
  state.editLapTarget = { sessionId, lapIndex };
  render();
}
function saveEditLap(sessionId, lapIndex, newStartHHMM, newEndHHMM) {
  const origSession = state.history.find(s => s.id === sessionId);
  if (!origSession) return;
  const session = JSON.parse(JSON.stringify(origSession));
  const lap = session.laps[lapIndex];
  if (!lap || lap.endAt == null) return;
  if (!newStartHHMM || !newEndHHMM) { showLapEditError('時刻を入力してください'); return; }
  const newStart = applyHHMM(lap.startAt, newStartHHMM);
  const newEnd   = applyHHMM(lap.endAt,   newEndHHMM);
  if (newStart >= newEnd) { showLapEditError('開始は終了より前にしてください'); return; }
  session.laps[lapIndex] = { ...lap, startAt: newStart, endAt: newEnd };
  if (lapIndex + 1 < session.laps.length)
    session.laps[lapIndex + 1] = { ...session.laps[lapIndex + 1], startAt: newEnd };
  if (lapIndex > 0)
    session.laps[lapIndex - 1] = { ...session.laps[lapIndex - 1], endAt: newStart };
  session.startAt = session.laps[0].startAt;
  const lastLap = session.laps[session.laps.length - 1];
  if (lastLap.endAt != null) session.endAt = lastLap.endAt;
  state.history = state.history.map(s => s.id === sessionId ? session : s);
  saveHistory(state.history);
  state.editLapTarget = null;
  render();
}

// ---------- Button handlers ----------
function onTapButton() {
  if (state.session) toggle();
}
function onTapEnd() {
  if (state.session) { state.confirmEnd = true; render(); }
}

// ---------- Canvas export ----------
async function drawDaySummary(day) {
  try { await document.fonts.ready; } catch {}
  const size = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  const getVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const C = {
    bg: getVar('--bg'), surfaceAlt: getVar('--surface-alt'),
    ink: getVar('--ink'), inkDim: getVar('--ink-dim'), inkMute: getVar('--ink-mute'),
    hair: getVar('--hair'), work: getVar('--work'), rest: getVar('--rest'),
    warn: getVar('--warn'),
  };
  const FD = '"Fraunces","Noto Serif JP",Georgia,serif';
  const FB = '"Noto Sans JP",-apple-system,sans-serif';

  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = C.ink; ctx.globalAlpha = 0.03;
  for (let y = 0; y < size; y += 6) for (let x = 0; x < size; x += 6) ctx.fillRect(x, y, 1, 1);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = C.hair; ctx.lineWidth = 1.5;
  ctx.strokeRect(48, 48, size - 96, size - 96);

  ctx.fillStyle = C.inkMute; ctx.font = '600 22px ' + FB; ctx.textAlign = 'left';
  ctx.fillText('LOOSE POMODORO', 96, 128);
  ctx.fillStyle = C.warn; ctx.beginPath(); ctx.arc(304, 120, 4, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = C.ink; ctx.font = 'italic 400 68px ' + FD;
  ctx.fillText(fmtDateJP(day.ts), 96, 218);

  ctx.strokeStyle = C.hair; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(96, 268); ctx.lineTo(size - 96, 268); ctx.stroke();

  ctx.fillStyle = C.work; ctx.font = '300 200px ' + FD; ctx.textAlign = 'left';
  ctx.fillText(fmtSummary(day.work), 96, 468);
  ctx.fillStyle = C.inkDim; ctx.font = '500 26px ' + FB;
  ctx.fillText('作業時間', 96, 508);

  const total = day.work + day.rest;
  const workPct = total > 0 ? Math.round((day.work / total) * 100) : 0;
  ctx.fillStyle = C.rest; ctx.font = 'italic 400 72px ' + FD;
  ctx.fillText(fmtSummary(day.rest), 96, 640);
  ctx.fillStyle = C.inkDim; ctx.font = '500 22px ' + FB;
  ctx.fillText('休憩', 96, 674);

  ctx.fillStyle = C.ink; ctx.font = 'italic 400 72px ' + FD; ctx.textAlign = 'right';
  ctx.fillText(workPct + '%', size - 96, 640);
  ctx.fillStyle = C.inkDim; ctx.font = '500 22px ' + FB;
  ctx.fillText('作業率', size - 96, 674);

  ctx.fillStyle = C.inkMute; ctx.font = '600 16px ' + FB; ctx.textAlign = 'left';
  ctx.fillText('TIMELINE — 24H', 96, 790);

  const tlX = 96, tlY = 820, tlW = size - 192, tlH = 56;
  ctx.fillStyle = C.surfaceAlt; ctx.fillRect(tlX, tlY, tlW, tlH);
  const dayStart = day.ts;
  for (const seg of day.segments) {
    const leftR = (seg.start - dayStart) / (24 * 3600 * 1000);
    const widthR = (seg.end - seg.start) / (24 * 3600 * 1000);
    ctx.fillStyle = seg.type === 'work' ? C.work : C.rest;
    ctx.fillRect(tlX + leftR * tlW, tlY, widthR * tlW, tlH);
  }
  ctx.fillStyle = C.inkMute; ctx.font = '500 20px ' + FB; ctx.textAlign = 'center';
  [0,6,12,18,24].forEach(h => {
    const x = tlX + (h / 24) * tlW;
    ctx.fillText(String(h), x, tlY + tlH + 36);
  });

  ctx.fillStyle = C.inkMute; ctx.font = 'italic 400 24px ' + FD; ctx.textAlign = 'center';
  ctx.fillText('鳴らないストップウォッチ', size / 2, size - 80);
  return canvas.toDataURL('image/png');
}
async function exportDay(day) {
  const dataUrl = await drawDaySummary(day);
  state.exportData = { dataUrl, day };
  render();
}
function downloadExport() {
  if (!state.exportData) return;
  const a = document.createElement('a');
  a.href = state.exportData.dataUrl;
  a.download = 'pomodoro-' + state.exportData.day.key + '.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ---------- Render ----------
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('view-now').classList.toggle('hidden', tab !== 'now');
  document.getElementById('view-history').classList.toggle('hidden', tab !== 'history');
  document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
  render();
}

function render() {
  renderNow();
  renderHistory();
  renderSettings();
  renderOverlays();
}

function renderNow() {
  const el = document.getElementById('view-now');
  if (!state.session) {
    el.innerHTML = `
      <button class="start-btn" id="startBtn">
        <span class="j">はじめる</span>
      </button>
    `;
    document.getElementById('startBtn').onclick = startSession;
    return;
  }

  const activeLap = state.session.laps[state.session.laps.length - 1];
  const mode = activeLap.type;
  const lapMs = state.now - activeLap.startAt;
  const today = todayTotals();
  const total = today.work + today.rest;
  const workPct = total > 0 ? (today.work / total) * 100 : 0;

  // Gentle message
  let gentle = '';
  if (mode === 'work' && lapMs >= 50 * 60 * 1000) {
    gentle = '50分経過。一息いれてもいいかも。';
  } else if (mode === 'rest' && lapMs >= 15 * 60 * 1000) {
    gentle = '休憩15分。そろそろ戻ってくる？';
  }

  el.innerHTML = `
    <button class="main-btn ${mode}" id="mainBtn">
      <div class="label">${mode === 'work' ? '作業中' : '休憩中'}</div>
      <div class="time">${fmtLap(lapMs)}</div>
    </button>
    <button class="end-btn" id="endBtn">終了</button>
    ${gentle ? `<div class="gentle"><span style="margin-right:8px;">✦</span>${escapeHtml(gentle)}</div>` : ''}
    <div class="today">
      <div class="label">today</div>
      <div class="today-row">
        <div class="cell work">
          <div class="t">作業</div>
          <div class="v">${fmtSummary(today.work)}</div>
        </div>
        <div class="cell rest">
          <div class="t">休憩</div>
          <div class="v">${fmtSummary(today.rest)}</div>
        </div>
        <div class="cell rate">
          <div class="t">作業率</div>
          <div class="v">${total > 0 ? Math.round(workPct) + '%' : '—'}</div>
        </div>
      </div>
      ${total > 0 ? `
        <div class="ratio-bar">
          <div style="width: ${workPct}%;"></div>
          <div style="width: ${100 - workPct}%;"></div>
        </div>
      ` : ''}
    </div>
  `;

  const btn = document.getElementById('mainBtn');
  btn.addEventListener('click', onTapButton);
  const endBtn = document.getElementById('endBtn');
  if (endBtn) endBtn.addEventListener('click', onTapEnd);
}

function renderHistory() {
  const el = document.getElementById('view-history');
  const allSessions = getAllSessionsLive();
  const days = aggregateByDay(allSessions);
  const dayMap = new Map(days.map(d => [d.key, d]));
  const last7 = getLastNDays(7, dayMap);

  if (days.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="big">まだ記録はありません</div>
        <div class="sub">「いま」から作業を始めると<br>ここに記録が溜まっていきます</div>
      </div>
    `;
    return;
  }

  el.innerHTML = `
    <div class="history">
      ${renderWeekChart(last7)}
      <div class="daily-label">daily log</div>
      ${days.map(d => renderDayCard(d, allSessions)).join('')}
    </div>
  `;

  // Event wiring
  el.querySelectorAll('.day-header').forEach(h => {
    h.onclick = () => {
      const k = h.dataset.day;
      state.expandedDayKey = (state.expandedDayKey === k) ? null : k;
      render();
    };
  });
  el.querySelectorAll('.export-btn').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const k = b.dataset.day;
      const day = days.find(d => d.key === k);
      if (day) exportDay(day);
    };
  });
  el.querySelectorAll('.del-btn').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = parseInt(b.dataset.id, 10);
      const session = state.history.find(s => s.id === id);
      if (!session) return;
      const t = sessionTotals(session);
      state.deleteTarget = {
        sessionId: id,
        firstStart: t.firstStart, lastEnd: t.lastEnd,
        work: t.work, rest: t.rest,
      };
      render();
    };
  });
  el.querySelectorAll('.lap-edit-btn').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      openEditLap(parseInt(b.dataset.sessionId, 10), parseInt(b.dataset.lapIndex, 10));
    };
  });
}

function renderWeekChart(days) {
  const max = Math.max(1, ...days.map(d => d.work + d.rest));
  const tK = todayKey();
  const totalWork = days.reduce((a, d) => a + d.work, 0);
  const totalAll = days.reduce((a, d) => a + d.work + d.rest, 0);
  const avgPct = totalAll > 0 ? Math.round((totalWork / totalAll) * 100) : 0;

  return `
    <div class="week-card">
      <div class="week-hd">
        <div class="label">this week</div>
        <div class="stats">
          合計 <em class="work">${fmtSummary(totalWork)}</em>
          <span class="dot">·</span>
          作業率 <em class="ink">${avgPct}%</em>
        </div>
      </div>
      <div class="week-bars">
        ${days.map(d => {
          const total = d.work + d.rest;
          const workH = (d.work / max) * 90;
          const restH = (d.rest / max) * 90;
          const isToday = d.key === tK;
          return `
            <div class="bar-col ${isToday ? 'today' : ''}">
              <div class="vlabel">${d.work > 0 ? fmtSummary(d.work) : ''}</div>
              <div class="bar ${total === 0 ? 'empty' : ''}">
                ${restH > 0 ? `<div class="rest-part" style="height:${restH}px;"></div>` : ''}
                ${workH > 0 ? `<div class="work-part" style="height:${workH}px;"></div>` : ''}
              </div>
              <div class="dlabel">${fmtDateShort(d.ts)}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderDayCard(day, allSessions) {
  const total = day.work + day.rest;
  const workPct = total > 0 ? (day.work / total) * 100 : 0;
  const isToday = day.key === todayKey();
  const expanded = state.expandedDayKey === day.key;
  const sessions = sessionsForDay(allSessions, day.key);
  const dayStart = day.ts;

  return `
    <div class="day-card ${expanded ? 'open' : ''}">
      <button class="day-header" data-day="${day.key}">
        <div class="top">
          <div class="date">${fmtDateJP(day.ts)}</div>
          ${isToday ? '<span class="today-badge">today</span>' : ''}
          <span class="chevron">⌄</span>
        </div>
        <div class="day-stats">
          <div class="cell work">
            <div class="t">作業</div>
            <div class="v">${fmtSummary(day.work)}</div>
          </div>
          <div class="cell rest">
            <div class="t">休憩</div>
            <div class="v">${fmtSummary(day.rest)}</div>
          </div>
          <div class="cell rate">
            <div class="t">作業率</div>
            <div class="v">${total > 0 ? Math.round(workPct) + '%' : '—'}</div>
          </div>
        </div>
        <div class="timeline-wrap">
          <div class="timeline-bg"></div>
          ${day.segments.map(seg => {
            const left = ((seg.start - dayStart) / (24*3600*1000)) * 100;
            const width = ((seg.end - seg.start) / (24*3600*1000)) * 100;
            return `<div class="timeline-seg ${seg.type}" style="left:${left}%; width:${width}%;"></div>`;
          }).join('')}
          <div class="timeline-ticks">
            ${[0,6,12,18,24].map(h => `<div class="tick" style="left:${(h/24)*100}%;">${h}</div>`).join('')}
          </div>
        </div>
      </button>
      ${expanded ? `
        <div class="day-body">
          <div class="sessions-head">
            <div class="sessions-label">sessions — ${sessions.length}件</div>
            <button class="export-btn" data-day="${day.key}">サマリー画像を保存</button>
          </div>
          ${sessions.map(s => renderSessionItem(s, day.key, dayStart)).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderSessionItem(session, dK, dayStart) {
  const totals = sessionTotals(session, dK);
  const total = totals.work + totals.rest;
  const workPct = total > 0 ? (totals.work / total) * 100 : 0;
  const isLive = state.session && session.id === state.session.id;
  const span = totals.lastEnd - totals.firstStart;

  const segments = session.laps
    .filter(l => l.endAt != null)
    .map(l => {
      const dayEnd = dayStart + 24*3600*1000;
      const s = Math.max(l.startAt, dayStart);
      const e = Math.min(l.endAt, dayEnd);
      if (s >= e) return null;
      return { type: l.type, start: s, end: e };
    })
    .filter(Boolean);

  return `
    <div class="session">
      <div class="srow1">
        <div class="sclock">${fmtClock(totals.firstStart)} — ${fmtClock(totals.lastEnd)}</div>
        ${isLive ? '<span class="live-badge">進行中</span>' : `<button class="del-btn" data-id="${session.id}">削除</button>`}
      </div>
      <div class="srow2">
        <span>作業 <em class="work">${fmtSummary(totals.work)}</em></span>
        <span>休憩 <em class="rest">${fmtSummary(totals.rest)}</em></span>
        <span class="rate-wrap">作業率 <em class="rate">${total > 0 ? Math.round(workPct) + '%' : '—'}</em></span>
      </div>
      ${span > 0 ? `
        <div class="session-tl">
          ${segments.map(seg => {
            const left = ((seg.start - totals.firstStart) / span) * 100;
            const width = ((seg.end - seg.start) / span) * 100;
            return `<div class="seg ${seg.type}" style="left:${left}%; width:${width}%;"></div>`;
          }).join('')}
        </div>
      ` : ''}
      ${!isLive ? `
        <div class="lap-list">
          ${session.laps.filter(l => l.endAt != null).map((l, i) => `
            <div class="lap-row">
              <span class="lap-type ${l.type}">${l.type === 'work' ? '作業' : '休憩'}</span>
              <span class="lap-time">${fmtClock(l.startAt)} — ${fmtClock(l.endAt)}</span>
              <span class="lap-dur">${fmtSummary(l.endAt - l.startAt)}</span>
              <button class="lap-edit-btn" data-session-id="${session.id}" data-lap-index="${i}">編集</button>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderSettings() {
  const el = document.getElementById('view-settings');
  el.innerHTML = `
    <div class="settings">
      <div class="status-card">
        <div class="sessions-label" style="letter-spacing:0.24em; text-transform:uppercase; font-size:11px; color:var(--ink-mute); font-weight:600;">status</div>
        <div class="body">
          保存済みセッション <strong>${state.history.length}</strong><br>
          データはこの端末にのみ保存
        </div>
      </div>
      <button class="danger-btn" id="clearAllBtn">すべてのデータを削除</button>
      <div class="note">
        v0.4 · ホーム画面に追加して使えます
      </div>
    </div>
  `;
  document.getElementById('clearAllBtn').onclick = () => {
    if (confirm('すべての履歴と進行中セッションを削除します。よろしいですか？')) {
      state.session = null;
      state.history = [];
      saveCurrent(null);
      saveHistory([]);
      render();
    }
  };
}

function renderOverlays() {
  // Remove existing overlays
  document.querySelectorAll('.snackbar, .sheet-overlay, .export-overlay').forEach(n => n.remove());

  // Undo snackbar
  if (state.undo) {
    const s = document.createElement('div');
    s.className = 'snackbar';
    s.innerHTML = `<span class="msg">切り替えました</span><button class="undo" id="undoBtn">元に戻す</button>`;
    document.body.appendChild(s);
    document.getElementById('undoBtn').onclick = applyUndo;
  }

  // Confirm end sheet
  if (state.confirmEnd) {
    const o = document.createElement('div');
    o.className = 'sheet-overlay';
    o.innerHTML = `
      <div class="sheet">
        <h2>セッションを終了</h2>
        <button class="btn-primary" id="confirmEndBtn">終了する</button>
        <button class="btn-ghost" id="cancelEndBtn">まだ続ける</button>
      </div>
    `;
    document.body.appendChild(o);
    o.onclick = (e) => { if (e.target === o) { state.confirmEnd = false; render(); } };
    document.getElementById('confirmEndBtn').onclick = endSession;
    document.getElementById('cancelEndBtn').onclick = () => { state.confirmEnd = false; render(); };
  }

  // Delete confirm sheet
  if (state.deleteTarget) {
    const t = state.deleteTarget;
    const o = document.createElement('div');
    o.className = 'sheet-overlay';
    o.innerHTML = `
      <div class="sheet">
        <h2>セッションを削除</h2>
        <div class="body">
          ${fmtClock(t.firstStart)}〜${fmtClock(t.lastEnd)}<br>
          作業 ${fmtSummary(t.work)} / 休憩 ${fmtSummary(t.rest)}
        </div>
        <div class="danger-note">削除すると元に戻せません</div>
        <button class="btn-primary danger" id="confirmDelBtn">削除</button>
        <button class="btn-ghost" id="cancelDelBtn">キャンセル</button>
      </div>
    `;
    document.body.appendChild(o);
    o.onclick = (e) => { if (e.target === o) { state.deleteTarget = null; render(); } };
    document.getElementById('confirmDelBtn').onclick = () => deleteSession(t.sessionId);
    document.getElementById('cancelDelBtn').onclick = () => { state.deleteTarget = null; render(); };
  }

  // Edit lap sheet
  if (state.editLapTarget) {
    const { sessionId, lapIndex } = state.editLapTarget;
    const targetSession = state.history.find(s => s.id === sessionId);
    if (!targetSession) { state.editLapTarget = null; }
    else {
      const lap = targetSession.laps[lapIndex];
      const typeLabel = lap.type === 'work' ? '作業' : '休憩';
      const startVal = fmtClock(lap.startAt);
      const endVal   = fmtClock(lap.endAt);
      const o = document.createElement('div');
      o.className = 'sheet-overlay';
      o.innerHTML = `
        <div class="sheet">
          <h2>ラップを編集</h2>
          <div class="lap-edit-type ${lap.type}">${typeLabel}</div>
          <div class="lap-edit-fields">
            <div class="lap-edit-field">
              <label for="lapStartInput">開始</label>
              <input id="lapStartInput" type="time" value="${startVal}">
            </div>
            <div class="lap-edit-field">
              <label for="lapEndInput">終了</label>
              <input id="lapEndInput" type="time" value="${endVal}">
            </div>
          </div>
          <div class="lap-edit-error" id="lapEditError" style="display:none;"></div>
          <button class="btn-primary" id="saveLapBtn">保存</button>
          <button class="btn-ghost" id="cancelLapBtn">キャンセル</button>
        </div>
      `;
      document.body.appendChild(o);
      o.onclick = (e) => { if (e.target === o) { state.editLapTarget = null; render(); } };
      document.getElementById('saveLapBtn').onclick = () => {
        const s = document.getElementById('lapStartInput').value;
        const e = document.getElementById('lapEndInput').value;
        saveEditLap(sessionId, lapIndex, s, e);
      };
      document.getElementById('cancelLapBtn').onclick = () => { state.editLapTarget = null; render(); };
    }
  }

  // Export preview
  if (state.exportData) {
    const o = document.createElement('div');
    o.className = 'export-overlay';
    o.innerHTML = `
      <div class="export-box">
        <img src="${state.exportData.dataUrl}" alt="summary">
        <div class="hint">長押しで保存 または 下のボタンからダウンロード</div>
        <button class="btn-primary" id="dlBtn">ダウンロード</button>
        <button class="btn-ghost" id="closeExportBtn">閉じる</button>
      </div>
    `;
    document.body.appendChild(o);
    o.onclick = (e) => { if (e.target === o) { state.exportData = null; render(); } };
    document.getElementById('dlBtn').onclick = downloadExport;
    document.getElementById('closeExportBtn').onclick = () => { state.exportData = null; render(); };
  }
}

// ---------- Boot ----------
function init() {
  state.session = loadCurrent();
  state.history = loadHistory();

  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.onclick = () => switchTab(b.dataset.tab);
  });

  // Tick
  setInterval(() => {
    state.now = Date.now();
    // Auto-expire undo
    if (state.undo && state.now >= state.undo.expiresAt) {
      state.undo = null;
    }
    // Only re-render the "now" view time display (avoid reflow storms)
    if (state.tab === 'now' && state.session) {
      renderNow();
    } else if (state.undo == null) {
      // Keep history live lap in sync occasionally
      if (state.tab === 'history' && state.session) renderHistory();
    }
  }, 1000);

  render();

  // Service worker (for PWA offline)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
}

init();
</script>
</body>
</html>
